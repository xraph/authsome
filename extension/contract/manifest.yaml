schemaVersion: 1
contributor:
  name: auth
  envelope:
    supports: [v1]
    preferred: v1
  capabilities: [auth.read, auth.write]

# Authsome owns two intents the Forge dashboard React shell consumes:
#  - auth.login    (command) — credentials in, session cookie out.
#  - auth.logout   (command) — clears the dashboard auth_token cookie and
#                              terminates the server-side session.
intents:
  - { name: auth.login,  kind: command, version: 1, capability: write }
  - { name: auth.logout, kind: command, version: 1, capability: write }

# /login is the page the dashboard's AuthGate renders when the principal
# endpoint returns 401 with code=UNAUTHENTICATED. The graph node below
# builds an authsome-branded form via the shell's form.edit + form.field
# vocabulary; submitting the form triggers the auth.login command.
graph:
  - route: /login
    intent: form.edit
    title: Sign in
    op: auth.login
    props:
      submitLabel: Sign in
    slots:
      fields:
        - intent: form.field
          props:
            name: email
            label: Email
            type: email
            placeholder: you@example.com
            required: true
            autocomplete: email
        - intent: form.field
          props:
            name: password
            label: Password
            type: password
            required: true
            autocomplete: current-password
