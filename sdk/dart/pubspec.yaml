repository: https://github.com/xraph/authsome
homepage: https://github.com/xraph/authsome
issue_tracker: https://github.com/xraph/authsome/issues

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  http: ^1.2.0
