name: authsome
display_name: "Authsome"
icon: shield-check
version: 1.0.0
type: templ
build:
  mode: local

nav:
  - label: Overview
    path: /
    icon: layout-dashboard
    group: Authsome
    priority: 0
  - label: Users
    path: /users
    icon: users
    group: Authsome
    priority: 1
  - label: Organizations
    path: /organizations
    icon: building-2
    group: Authsome
    priority: 2
  - label: Sessions
    path: /sessions
    icon: key-round
    group: Authsome
    priority: 3
  - label: Devices
    path: /devices
    icon: monitor-smartphone
    group: Authsome
    priority: 4
  - label: Roles
    path: /roles
    icon: shield
    group: Authsome
    priority: 5
  - label: Webhooks
    path: /webhooks
    icon: webhook
    group: Authsome
    priority: 6

widgets:
  - id: authsome-stats
    title: "Auth Stats"
    description: "User and organization counts"
    size: md
    refresh_sec: 60
  - id: authsome-recent-signups
    title: "Recent Signups"
    description: "Latest user registrations"
    size: md
    refresh_sec: 30
  - id: authsome-activity
    title: "Auth Activity"
    description: "Recent authentication events"
    size: lg
    refresh_sec: 15

settings:
  - id: authsome-config
    title: "Authsome Settings"
    description: "Configure authentication behavior"
    group: Authsome
    icon: shield-check

searchable: true
