name: authsome
display_name: "Authsome"
icon: shield-check
version: 1.0.0
type: templ
build:
  mode: local

nav:
  # Authsome
  - label: Overview
    path: /
    icon: layout-dashboard
    group: Authsome
    priority: 0

  # User Management
  - label: Users
    path: /users
    icon: users
    group: User Management
    priority: 0
  - label: Sessions
    path: /sessions
    icon: key-round
    group: User Management
    priority: 1
  - label: Devices
    path: /devices
    icon: monitor-smartphone
    group: User Management
    priority: 2

  # Access Control
  - label: Roles
    path: /roles
    icon: shield
    group: Access Control
    priority: 0

  # Configuration
  - label: Settings
    path: /settings
    icon: settings
    group: Configuration
    priority: 0
  - label: Environments
    path: /environments
    icon: globe
    group: Configuration
    priority: 1
  - label: Signup Forms
    path: /signup-forms
    icon: file-edit
    group: Configuration
    priority: 2

  # Developer
  - label: Credentials
    path: /credentials
    icon: key
    group: Developer
    priority: 0
  - label: Webhooks
    path: /webhooks
    icon: webhook
    group: Developer
    priority: 1
  - label: Plugins
    path: /plugins
    icon: puzzle
    group: Developer
    priority: 2

widgets:
  - id: authsome-stats
    title: "Auth Stats"
    description: "User and organization counts"
    size: md
    refresh_sec: 60
  - id: authsome-recent-signups
    title: "Recent Signups"
    description: "Latest user registrations"
    size: md
    refresh_sec: 30
  - id: authsome-activity
    title: "Auth Activity"
    description: "Recent authentication events"
    size: lg
    refresh_sec: 15

settings:
  - id: authsome-config
    title: "Authsome Settings"
    description: "Configure authentication behavior"
    group: Authsome
    icon: shield-check

searchable: true
